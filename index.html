<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A modern, interactive learning notes platform with GitHub integration, markdown editing, and collaborative features." />
    <meta name="keywords" content="learning, notes, markdown, github, collaboration, education, documentation" />
    <meta name="author" content="Learning Notes Platform" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Learning Notes - Interactive Knowledge Hub" />
    <meta property="og:description" content="A modern, interactive learning notes platform with GitHub integration, markdown editing, and collaborative features." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://learning-notes.vercel.app" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Learning Notes - Interactive Knowledge Hub" />
    <meta name="twitter:description" content="A modern, interactive learning notes platform with GitHub integration, markdown editing, and collaborative features." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="msapplication-TileColor" content="#8b5cf6" />
    
    <!-- Prevent Theme Flash -->
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('ui-theme') || 'system';
          const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const resolvedTheme = savedTheme === 'system' ? (systemPrefersDark ? 'dark' : 'light') : savedTheme;
          
          // Apply theme immediately with changing class
          const root = document.documentElement;
          root.classList.add('theme-changing');
          root.classList.remove('light', 'dark');
          root.classList.add(resolvedTheme);
          
          // Set theme color based on resolved theme
          const themeColor = resolvedTheme === 'dark' ? '#0f172a' : '#ffffff';
          const metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', themeColor);
          }
          
          // Store the initial theme for React to pick up
          window.__INITIAL_THEME__ = resolvedTheme;
        } catch (e) {
          // Fallback to light theme
          document.documentElement.classList.add('theme-changing', 'light');
          window.__INITIAL_THEME__ = 'light';
        }
      })();
    </script>
    
    <title>Learning Notes - Interactive Knowledge Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
